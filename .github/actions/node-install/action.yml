name: 'Setup node'
inputs:
  node_version:
    required: false
    default: v22.x

runs:
  using: 'composite'
  steps:
    - name: Set up Node ${{ inputs.node_version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Enable corepack
      shell: bash
      run: corepack enable npm

    - name: Install dependencies
      shell: bash
      run: |
        npm ci --no-audit
        npm run prisma:generate
      env:
        HUSKY: '0'
