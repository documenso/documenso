# Cloud Build config — builds the container image and deploys to Cloud Run.
#
# Triggered automatically on push to main, or manually via:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_IMAGE=REGION-docker.pkg.dev/PROJECT/REPO/keepcontracts:latest .

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=docker/Dockerfile
      - --tag=${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - keepcontracts
      - --image=${_IMAGE}
      - --region=us-west1
      - --project=$PROJECT_ID

images:
  - ${_IMAGE}

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 2400s
